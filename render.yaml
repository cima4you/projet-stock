databases:
  - name: projet-stock-db
    plan: free
    databaseName: stockdb
    user: stockuser

services:
  - type: web
    name: projet-stock
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: projet-stock-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: EMAIL_ADDRESS
        value: ""
      - key: EMAIL_PASSWORD
        value: ""
      - key: NOTIFICATION_EMAIL
        value: ""
      - key: DEFAULT_ADMIN_USERNAME
        value: admin
      - key: DEFAULT_ADMIN_PASSWORD
        value: bj319260
      - key: DEFAULT_ADMIN_EMAIL
        value: bazigherachid@gmail.com
      - key: DAILY_REPORT_RECIPIENTS
        value: bazigherachid@gmail.com
