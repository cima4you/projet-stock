<!DOCTYPE html>
<html lang="{{ 'ar' if lang == 'ar' else 'fr' }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ translations.login }} - {{ translations.stock_management_system }}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page{% if lang == 'ar' %} rtl{% endif %}">
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center">
        <div class="row justify-content-center w-100">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <!-- Logo -->
                        <div class="text-center mb-4">
                            <img src="{{ url_for('get_logo') }}" alt="Logo" height="60" class="d-none" id="logo" onerror="this.classList.add('d-none');" onload="this.classList.remove('d-none');">
                            <div id="logo-placeholder" class="mb-3">
                                <i class="fas fa-boxes fa-3x text-primary"></i>
                            </div>
                            <h2 class="card-title text-center mb-1">{{ translations.stock_management_system }}</h2>
                            <p class="text-muted text-center">{{ translations.login }}</p>
                        </div>

                        <!-- Flash Messages -->
                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <!-- Login Form -->
                        <form method="POST">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <div class="mb-3">
                                <label for="username" class="form-label">{{ translations.username }}</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-user"></i>
                                    </span>
                                    <input type="text" class="form-control" id="username" name="username" required autofocus>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">{{ translations.password }}</label>
                                <div class="input-group">
                                    <span class="input-group-text">
                                        <i class="fas fa-lock"></i>
                                    </span>
                                    <input type="password" class="form-control" id="password" name="password" required>
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-sign-in-alt me-2"></i>
                                    {{ translations.login }}
                                </button>
                            </div>
                            
                            <div class="text-center">
                                <a href="{{ url_for('forgot_password') }}" class="text-decoration-none">
                                    {{ translations.forgot_password }}
                                </a>
                            </div>
                        </form>
                    </div>
                    
                    <!-- Language Switcher -->
                    <div class="card-footer bg-light text-center">
                        <div class="btn-group" role="group">
                            <a href="{{ url_for('change_language', lang='fr') }}" class="btn btn-sm {{ 'btn-primary' if lang == 'fr' else 'btn-outline-primary' }}">Français</a>
                            <a href="{{ url_for('change_language', lang='ar') }}" class="btn btn-sm {{ 'btn-primary' if lang == 'ar' else 'btn-outline-primary' }}">العربية</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const password = document.getElementById('password');
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            const icon = this.querySelector('i');
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        });

        // Handle logo loading
        document.getElementById('logo').addEventListener('load', function() {
            document.getElementById('logo-placeholder').style.display = 'none';
        });
    </script>
</body>
</html>
