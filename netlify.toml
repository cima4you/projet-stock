[build]
  command = "pip install -r requirements.txt"
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200

[functions]
  included_files = ["**/*.py", "**/*.db", "**/*.json", "email_templates/**"]

[build.environment]
  PYTHON_VERSION = "3.11"
